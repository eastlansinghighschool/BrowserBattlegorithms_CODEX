<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Battlegorithms</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <h1>Browser Battlegorithms</h1>
        <a id="helpLink" class="app-help-link" href="./help.html" target="_blank" rel="noopener" aria-label="Open Help">
          ?
        </a>
      </div>
    </header>
    <div id="tutorial-overlay" aria-live="polite"></div>
    <div id="goal-burst-overlay" aria-hidden="true"></div>
    <div id="game-container">
      <main id="simulation-region">
        <div id="canvas-container">
          <div id="board-loading-placeholder" class="panel-loading-card">
            <div class="panel-loading-grid" aria-hidden="true"></div>
            <p id="board-loading-message" class="panel-loading-title">Preparing game board...</p>
            <p id="board-loading-error-message" class="panel-loading-error"></p>
            <button id="board-loading-retry" type="button" hidden>Retry Board</button>
          </div>
        </div>
        <div id="instructions">
          <div id="primary-level-actions">
            <button id="playResetButton" style="padding: 10px 20px; font-size: 16px;">Play</button>
            <button id="showTutorialButton" style="padding: 10px 20px; font-size: 16px; display: none;">Show Tutorial</button>
            <button id="nextLevelButton" style="padding: 10px 20px; font-size: 16px; display: none;">Next Level</button>
          </div>
          <div id="game-controls" style="margin-top: 10px; padding: 10px; background-color: #fff; border-radius: 8px; text-align: center;">
            <label for="speedSlider">Game Speed:</label>
            <input type="range" id="speedSlider" min="1" max="20" value="10" style="vertical-align: middle;">
            <span id="speedValue" style="margin-left: 10px;">Normal</span>
            <p id="scoreDisplay" style="margin-top:10px; font-weight: bold;">Turn: 1 | Scores: T1: 0 - T2: 0 (Win at 2)</p>
          </div>
        </div>
      </main>
      <aside id="lesson-region">
        <div id="level-panel"></div>
      </aside>
      <aside id="blockly-region">
        <h2 id="blocklyPanelTitle">AI Ally Program</h2>
        <div id="blockly-program-tabs"></div>
        <div id="blockly-program-summary"></div>
        <p id="workspace-import-status" class="workspace-import-status" hidden></p>
        <div id="blockly-toolbar">
          <div id="blockly-size-controls" aria-label="Program workspace size">
            <button type="button" data-blockly-size="compact">Compact</button>
            <button type="button" data-blockly-size="standard">Standard</button>
            <button type="button" data-blockly-size="tall">Tall</button>
          </div>
          <button id="exportWorkspaceButton" type="button">Export XML</button>
          <button id="importWorkspaceButton" type="button">Import XML</button>
          <button id="soundToggleButton" type="button">Sound: On</button>
          <input id="importWorkspaceInput" type="file" accept=".xml,text/xml" hidden>
        </div>
        <div id="blockly-workspace-shell">
          <div id="blockly-loading-placeholder" class="panel-loading-card panel-loading-card-program">
            <div class="panel-loading-blocks" aria-hidden="true">
              <span class="panel-loading-block panel-loading-block-wide"></span>
              <span class="panel-loading-block panel-loading-block-medium"></span>
              <span class="panel-loading-block panel-loading-block-small"></span>
            </div>
            <p id="blockly-loading-message" class="panel-loading-title">Loading code blocks...</p>
            <p id="blockly-loading-error-message" class="panel-loading-error"></p>
            <button id="blockly-loading-retry" type="button" hidden>Retry Editor</button>
          </div>
          <div id="blocklyDiv" hidden></div>
        </div>
      </aside>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
